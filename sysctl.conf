# 📁 /etc/sysctl.d/99-wg-easy-bash.conf

# ——— SYSTEM ——————————————————————————————————————
fs.file-max = 51200                        # Максимум открытых файлов в системе глобально

# ——— SECURITY / FIREWALL ————————————————————————
net.ipv4.ip_forward = 1                    # Включить IP-перенаправление (для VPN)
net.ipv4.icmp_echo_ignore_all = 1          # Отключить ответы на пинг (двухсторонний пинг)

# ——— NETWORK CORE ——————————————————————————————————
net.core.rmem_max = 16777216               # Максимальный буфер приема (16 MB)
net.core.wmem_max = 16777216               # Максимальный буфер отправки (16 MB)
net.core.rmem_default = 262144             # По умолчанию буфер приема (256 KB)
net.core.wmem_default = 262144             # По умолчанию буфер отправки (256 KB)
net.core.netdev_max_backlog = 4096         # Очередь на уровне интерфейса
net.core.somaxconn = 4096                  # Очередь соединений до accept()

# ——— TCP BUFFER OPTIMIZATION —————————————————————  
net.ipv4.tcp_mem = 8192 16384 32768        # Глобальный лимит TCP (в страницах по 4 KB, max 128 МБ)
net.ipv4.tcp_rmem = 4096 87380 16777216    # Буфер чтения TCP: min=4 KB, default=85.3 KB, max=16 MB
net.ipv4.tcp_wmem = 4096 65536 16777216    # Буфер записи TCP: min=4 KB, default=64 KB, max=16 MB

# ——— IPV4 OPTIMIZATION ———————————————————————————
net.ipv4.tcp_syncookies = 1                # Защита от SYN-флуда
net.ipv4.tcp_tw_reuse = 1                  # Повторное использование TIME-WAIT
net.ipv4.tcp_tw_recycle = 0                # Отключить опасный быстрый recycle
net.ipv4.tcp_fin_timeout = 30              # Быстрее закрывать соединения
net.ipv4.tcp_keepalive_time = 1200         # Поддержание соединения (20 мин)

net.ipv4.ip_local_port_range = 10000 65000 # Диапазон исходящих портов
net.ipv4.tcp_max_syn_backlog = 4096        # SYN backlog
net.ipv4.tcp_max_tw_buckets = 5000         # TIME-WAIT сокеты

net.ipv4.tcp_fastopen = 3                  # TCP Fast Open клиент+сервер
net.ipv4.tcp_mtu_probing = 1               # Обход проблем с MTU в VPN

# net.ipv4.tcp_congestion_control = cubic  # TCP cubic для сетей с низкой задержкой
# net.ipv4.tcp_congestion_control = hybla  # TCP hybla для сетей с высокой задержкой
# net.core.default_qdisc = fq              # TCP bbr контроль перегрузки сети (версия линус ядра >= 4.2)
# net.ipv4.tcp_congestion_control = bbr    # TCP bbr контроль перегрузки сети (версия линус ядра >= 4.2)
